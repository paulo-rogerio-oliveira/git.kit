name: CD

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão para o pacote (ex.: v1.0.0). Sem tag, usada apenas no nome do arquivo.'
        required: false
        default: 'v0.0.0-dev'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish (win-x64, executável único, self-contained)
        # Single-file: um único GitKit.exe, com runtime e libs nativas embutidos
        # (auto-extraídos em runtime). O usuário final não precisa ter .NET instalado.
        run: >
          dotnet publish src/GitKit.App/GitKit.App.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=none
          -o publish/app

      - name: Preparar artefatos (exe único + manual PDF)
        id: pack
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -ne "push") { $tag = "${{ github.event.inputs.version }}" }
          $clean = ($tag -replace '^v','')
          if ([string]::IsNullOrWhiteSpace($clean)) { $clean = "dev" }

          $dist = "dist"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null

          $exe = Join-Path $dist "git.kit-$clean-win-x64.exe"
          Copy-Item publish/app/GitKit.exe $exe -Force

          # Distribui SOMENTE o manual em PDF junto do executável.
          $pdf = Join-Path $dist "manual-do-usuario.pdf"
          Copy-Item docs/manual-do-usuario.pdf $pdf -Force

          "exe=$exe" >> $env:GITHUB_OUTPUT
          "pdf=$pdf" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Upload dos artefatos (workflow)
        uses: actions/upload-artifact@v4
        with:
          name: git.kit-win-x64
          path: |
            ${{ steps.pack.outputs.exe }}
            ${{ steps.pack.outputs.pdf }}

      - name: Criar GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release create "${{ steps.pack.outputs.tag }}"
          "${{ steps.pack.outputs.exe }}"
          "${{ steps.pack.outputs.pdf }}"
          --title "git.kit ${{ steps.pack.outputs.tag }}"
          --generate-notes
