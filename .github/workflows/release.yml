name: CD

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão para o pacote (ex.: v1.0.0). Sem tag, usada apenas no nome do zip.'
        required: false
        default: 'v0.0.0-dev'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish (win-x64, self-contained)
        run: >
          dotnet publish src/GitKit.App/GitKit.App.csproj
          -c Release -r win-x64 --self-contained true
          -o publish/app

      - name: Empacotar app + manual do usuário
        id: pack
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -ne "push") { $tag = "${{ github.event.inputs.version }}" }
          $clean = ($tag -replace '^v','')
          if ([string]::IsNullOrWhiteSpace($clean)) { $clean = "dev" }

          $stage = "stage/git.kit-$clean"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null

          # Binários publicados.
          Copy-Item publish/app/* $stage -Recurse -Force

          # Manual do usuário (HTML + imagens) distribuído junto do artefato.
          $manual = Join-Path $stage 'manual'
          New-Item -ItemType Directory -Force -Path $manual | Out-Null
          Copy-Item docs/manual-do-usuario.html $manual -Force
          Copy-Item docs/images (Join-Path $manual 'images') -Recurse -Force

          $zip = "git.kit-$clean-win-x64.zip"
          Compress-Archive -Path "$stage/*" -DestinationPath $zip -Force

          "zip=$zip" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Upload do artefato (workflow)
        uses: actions/upload-artifact@v4
        with:
          name: git.kit-win-x64
          path: ${{ steps.pack.outputs.zip }}

      - name: Criar GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release create "${{ steps.pack.outputs.tag }}"
          "${{ steps.pack.outputs.zip }}"
          --title "git.kit ${{ steps.pack.outputs.tag }}"
          --generate-notes
