name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    # WPF (net10.0-windows) e os testes de integração de git só rodam no Windows.
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Configurar identidade git
        # Alguns testes clonam repositórios e commitam neles (cherry-pick). Um clone
        # não herda a config local; sem identidade global o runner falha o commit
        # ("committer identity unknown"). Espelha uma máquina de desenvolvimento.
        run: |
          git config --global user.email "ci@git.kit.local"
          git config --global user.name "git.kit CI"
          git config --global commit.gpgsign false

      - name: Restore
        run: dotnet restore GitKit.slnx

      - name: Build (Release)
        run: dotnet build GitKit.slnx -c Release --no-restore

      - name: Test
        # TestRepository cria repositórios git temporários; o git já vem no runner.
        run: dotnet test tests/GitKit.Core.Tests/GitKit.Core.Tests.csproj -c Release --no-build --verbosity normal
